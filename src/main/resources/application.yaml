spring:
  application:
    name: cards-service

  datasource:
    url: jdbc:mysql://localhost:3307/cards_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: cards_user
    password: cards_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    show-sql: true

# Configuración de Swagger/OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

server:
  port: 8081

account-service:
  account-service-url: http://localhost:8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

